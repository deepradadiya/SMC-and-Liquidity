<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Trading System - Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #2d5a2d; border: 1px solid #4a8a4a; }
        .error { background: #5a2d2d; border: 1px solid #8a4a4a; }
        .info { background: #2d2d5a; border: 1px solid #4a4a8a; }
        button { padding: 10px 20px; margin: 5px; background: #4a8a4a; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #5a9a5a; }
        pre { background: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .price { font-size: 24px; font-weight: bold; color: #4a8a4a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SMC Trading System - Connection Test</h1>
        
        <div id="status" class="status info">
            📡 Ready to test connection...
        </div>
        
        <div>
            <button onclick="testConnection()">🔍 Test Backend Connection</button>
            <button onclick="testLogin()">🔑 Test Login</button>
            <button onclick="testData()">📊 Test Real Data</button>
            <button onclick="testAll()">🎯 Test Everything</button>
        </div>
        
        <div id="results"></div>
        
        <div id="priceDisplay" style="display: none;">
            <h2>📈 Live Market Data</h2>
            <div class="price" id="btcPrice">Loading...</div>
            <div id="priceDetails"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:8000';
        let authToken = null;
        
        function updateStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }
        
        function addResult(title, content, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `<strong>${title}</strong><pre>${content}</pre>`;
            results.appendChild(div);
        }
        
        async function testConnection() {
            updateStatus('🔍 Testing backend connection...', 'info');
            
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    updateStatus('✅ Backend connected successfully!', 'success');
                    addResult('Health Check', JSON.stringify(data, null, 2), 'success');
                } else {
                    updateStatus('❌ Backend connection failed', 'error');
                    addResult('Health Check Failed', `Status: ${response.status}`, 'error');
                }
            } catch (error) {
                updateStatus('❌ Cannot reach backend', 'error');
                addResult('Connection Error', error.message, 'error');
            }
        }
        
        async function testLogin() {
            updateStatus('🔑 Testing login...', 'info');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'smc_admin_2024'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    authToken = data.access_token;
                    updateStatus('✅ Login successful!', 'success');
                    addResult('Login Success', `Token: ${authToken.substring(0, 20)}...`, 'success');
                } else {
                    updateStatus('❌ Login failed', 'error');
                    addResult('Login Failed', JSON.stringify(data, null, 2), 'error');
                }
            } catch (error) {
                updateStatus('❌ Login error', 'error');
                addResult('Login Error', error.message, 'error');
            }
        }
        
        async function testData() {
            if (!authToken) {
                updateStatus('⚠️ Please login first', 'error');
                return;
            }
            
            updateStatus('📊 Fetching real market data...', 'info');
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/data/ohlcv?symbol=BTCUSDT&timeframe=1h&start=2024-12-01T00:00:00Z&end=2024-12-31T23:59:59Z&limit=10`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.length > 0) {
                    const latest = data[data.length - 1];
                    updateStatus('✅ Real market data retrieved!', 'success');
                    
                    // Show price
                    document.getElementById('priceDisplay').style.display = 'block';
                    document.getElementById('btcPrice').textContent = `BTC/USDT: $${parseFloat(latest.close).toLocaleString()}`;
                    document.getElementById('priceDetails').innerHTML = `
                        <p>📅 Time: ${latest.timestamp}</p>
                        <p>📈 OHLC: $${latest.open} / $${latest.high} / $${latest.low} / $${latest.close}</p>
                        <p>📊 Volume: ${parseFloat(latest.volume).toLocaleString()}</p>
                        <p>🎉 This is REAL market data from Binance!</p>
                    `;
                    
                    addResult('Market Data', `Retrieved ${data.length} candles. Latest: $${latest.close}`, 'success');
                } else {
                    updateStatus('❌ No market data', 'error');
                    addResult('Data Error', JSON.stringify(data, null, 2), 'error');
                }
            } catch (error) {
                updateStatus('❌ Data fetch error', 'error');
                addResult('Data Error', error.message, 'error');
            }
        }
        
        async function testAll() {
            document.getElementById('results').innerHTML = '';
            await testConnection();
            await new Promise(resolve => setTimeout(resolve, 1000));
            await testLogin();
            await new Promise(resolve => setTimeout(resolve, 1000));
            await testData();
        }
        
        // Auto-run test on page load
        window.onload = () => {
            setTimeout(testAll, 500);
        };
    </script>
</body>
</html>
