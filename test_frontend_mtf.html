<!DOCTYPE html>
<html>
<head>
    <title>Test MTF API</title>
</head>
<body>
    <h1>MTF Confluence API Test</h1>
    <button onclick="testMTF()">Test MTF API</button>
    <div id="result"></div>

    <script>
        async function testMTF() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('http://localhost:8000/api/mtf/mtf-analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        symbol: 'BTCUSDT',
                        entry_tf: '5m',
                        htf: '4h',
                        mtf: '1h'
                    })
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h2>MTF Analysis Result:</h2>
                    <p><strong>Confluence Score:</strong> ${data.confluence_score}/100</p>
                    <p><strong>Entry:</strong> $${data.entry || 'No entry'}</p>
                    <p><strong>Bias:</strong> ${data.bias}</p>
                    <p><strong>Signal Valid:</strong> ${data.signal_valid}</p>
                    <p><strong>Timestamp:</strong> ${data.analysis_timestamp}</p>
                    <h3>Raw Data:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
